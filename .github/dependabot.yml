version: 2
updates:
- package-ecosystem: nuget
  directories:
    - "/SteamKit2"
    - "/Resources/ProtobufGen"
    - "/Resources/ProtobufDumper"
  schedule:
    interval: monthly
  open-pull-requests-limit: 10
  groups:
    all-nuget:
      patterns:
        - "*"
      cooldown:
        period: 7
        period-unit: days

- package-ecosystem: "github-actions"
  directory: "/"
  schedule:
    interval: monthly
  ignore:
    - dependency-name: "*"
      update-types: ["version-update:semver-minor", "version-update:semver-patch"]
